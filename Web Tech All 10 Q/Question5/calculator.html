<!DOCTYPE html>
<html>
<head>
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .calculator {
      width: 300px;
      margin: 40px auto;
      padding: 20px;
      background: #222;
      border-radius: 10px;
      text-align: center;
    }
    input {
      width: 90%;
      height: 40px;
      margin-bottom: 10px;
      font-size: 18px;
      text-align: right;
    }
    button {
      width: 60px;
      height: 40px;
      margin: 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="index.html">Main Menu</a>
    <a href="house1.html">Geto's house</a>
    <a href="house2.html">GOJO's house</a>
    <a href="house3.html">Sukuna's house</a>
    <a href="house4.html">Yuji's house</a>
    <a href="calculator.html">Calculator</a>
  </div>

  <h1 style="text-align:center;">Scientific Calculator</h1>

  <div class="calculator">
    <input type="text" id="display" readonly>
    <br>
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">÷</button>
    <br>
    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">×</button>
    <br>
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">−</button>
    <br>
    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="press('+')">+</button>
    <br>
    <button onclick="sqrt()">√</button>
    <button onclick="power()">x²</button>
    <button onclick="sin()">sin</button>
    <button onclick="cos()">cos</button>
    <br>
    <button onclick="clearDisplay()" style="width: 90%;">Clear</button>
  </div>

  <script>
    function press(value) {
      document.getElementById("display").value += value;
    }

    function calculate() {
      try {
        document.getElementById("display").value =
          eval(document.getElementById("display").value);
      } catch {
        alert("Invalid Expression");
      }
    }

    function clearDisplay() {
      document.getElementById("display").value = "";
    }

    function sqrt() {
      let val = document.getElementById("display").value;
      document.getElementById("display").value = Math.sqrt(val);
    }

    function power() {
      let val = document.getElementById("display").value;
      document.getElementById("display").value = Math.pow(val, 2);
    }

    function sin() {
      let val = document.getElementById("display").value;
      document.getElementById("display").value = Math.sin(val);
    }

    function cos() {
      let val = document.getElementById("display").value;
      document.getElementById("display").value = Math.cos(val);
    }
  </script>

</body>
</html>
